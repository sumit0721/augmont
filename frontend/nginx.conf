# ──────────────────────────────────────────────────────────────
# Nginx config for Angular SPA (Single Page Application)
# ──────────────────────────────────────────────────────────────
# WHY DO WE NEED THIS?
#   Angular uses client-side routing (e.g., /products, /categories).
#   If a user refreshes the page at /products, Nginx would try to find
#   a file called "products" on disk — which doesn't exist!
#   The "try_files" directive below tells Nginx:
#   "If you can't find the file, just serve index.html and let Angular handle the routing."
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
