<div class="dashboard-layout" *ngIf="isLoggedIn()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 class="brand">AUGMONT</h2>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <i class="icon-dashboard"></i>
        <span>Dashboard</span>
      </a>
      
      <a routerLink="/products" routerLinkActive="active" class="nav-item">
        <i class="icon-products"></i>
        <span>Products</span>
      </a>

      <a routerLink="/categories" routerLinkActive="active" class="nav-item">
        <i class="icon-categories"></i>
        <span>Categories</span>
      </a>
      
      <a routerLink="/users" routerLinkActive="active" class="nav-item">
        <i class="icon-users"></i>
        <span>Users</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">AUGMONT Admin</h1>
      </div>
      
      <div class="topbar-right">
        <div class="admin-badge">
          <span>AUGMONT Admin</span>
        </div>
        <div class="user-profile" *ngIf="currentUser">
          <div class="avatar">
            {{ currentUser.email.charAt(0).toUpperCase() }}
          </div>
          <span class="user-email">{{ currentUser.email }}</span>
        </div>
        <button (click)="logout()" class="btn-logout">Logout</button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Login/Register Layout (When not logged in) -->
<div class="auth-layout" *ngIf="!isLoggedIn()">
  <router-outlet></router-outlet>
</div>
