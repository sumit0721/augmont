# ──────────────────────────────────────────────────────────────
# GitHub Actions — Deploy Backend to AWS EC2
# ──────────────────────────────────────────────────────────────
# WHAT THIS DOES:
#   After CI passes on the "main" branch, this workflow:
#   1. SSHs into your EC2 instance
#   2. Pulls the latest code from GitHub
#   3. Rebuilds the Docker images on EC2
#   4. Restarts the containers with zero downtime
#
# REQUIRED GITHUB SECRETS (you must add these in GitHub):
#   EC2_HOST        — Your EC2 public IP address
#   EC2_USER        — Usually "ubuntu" for Ubuntu AMI
#   EC2_SSH_KEY     — Your EC2 private key (.pem file contents)
# ──────────────────────────────────────────────────────────────

name: CD — Deploy Backend to EC2

on:
  workflow_run:
    workflows: ["CI — Test & Build"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    # Only deploy if CI passed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📥 Navigating to project directory..."
            cd ~/augmont-sumit

            echo "📥 Pulling latest code from GitHub..."
            git pull origin main

            echo "🐳 Building Docker images on EC2..."
            docker compose build --no-cache backend

            echo "🚀 Restarting containers..."
            docker compose up -d

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✅ Deployment complete!"
            docker compose ps
