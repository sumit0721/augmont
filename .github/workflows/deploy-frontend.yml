# ──────────────────────────────────────────────────────────────
# GitHub Actions — Deploy Frontend
# ──────────────────────────────────────────────────────────────
# WHAT THIS DOES:
#   After CI passes on "main", this workflow:
#   1. PRIMARY: Triggers a Vercel deployment (auto-handled by Vercel GitHub integration)
#   2. BACKUP: Also rebuilds the frontend Docker container on EC2
#      so you always have a fallback if Vercel has issues
#
# REQUIRED GITHUB SECRETS:
#   EC2_HOST        — Your EC2 public IP address
#   EC2_USER        — Usually "ubuntu" for Ubuntu AMI
#   EC2_SSH_KEY     — Your EC2 private key (.pem file contents)
# ──────────────────────────────────────────────────────────────

name: CD — Deploy Frontend

on:
  workflow_run:
    workflows: ["CI — Test & Build"]
    types: [completed]
    branches: [main]

jobs:
  deploy-frontend-docker:
    name: 🐳 Deploy Frontend Docker (EC2 Backup)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔐 Deploy frontend container via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📥 Navigating to project directory..."
            cd ~/augmont-sumit

            echo "📥 Pulling latest code from GitHub..."
            git pull origin main

            echo "🐳 Rebuilding frontend Docker image on EC2..."
            docker compose build --no-cache frontend

            echo "🚀 Restarting frontend container..."
            docker compose up -d frontend

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✅ Frontend Docker deployment complete!"
            echo "🌐 Frontend available at http://$(curl -s ifconfig.me):4200"
