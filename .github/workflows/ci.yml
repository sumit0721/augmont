# ──────────────────────────────────────────────────────────────
# GitHub Actions — Continuous Integration (CI)
# ──────────────────────────────────────────────────────────────
# WHAT THIS DOES:
#   Every time you push code to the "main" branch (or open a PR),
#   GitHub automatically:
#   1. Spins up a fresh Ubuntu virtual machine
#   2. Installs Node.js
#   3. Runs your backend tests
#   4. Builds the Angular frontend (catches TypeScript errors)
#
# WHY?
#   This catches bugs BEFORE they reach production.
#   If tests fail, the CD pipeline won't deploy broken code.
# ──────────────────────────────────────────────────────────────

name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Test the Backend ──────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    # Spin up a PostgreSQL container for tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: augmont_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📥 Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: 🧪 Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3000
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: testpassword
          DB_NAME: augmont_test
          JWT_SECRET: test_secret_key
          JWT_EXPIRES_IN: 24h
          CORS_ORIGIN: "*"
        run: npm test

  # ── Job 2: Build the Frontend ────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build Angular app
        working-directory: frontend
        run: npx ng build --configuration=production
